<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paris Ciné Aujourd'hui</title>
<link rel="icon" href="icon48.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="layout">
    <aside id="rail">
      <p id="rail-word" title="Retour en haut">Paris Ciné</p>
      <div id="rail-stat">
        <span class="num" id="stat-count">–</span>
        <span class="lbl">Films aujourd'hui</span>
      </div>
      <div id="rail-watchlist-block">
        <div class="rail-block-h">Dans votre liste</div>
        <div id="rail-watchlist-count" class="rail-watchlist-count"></div>
        <div id="rail-watchlist-today" class="rail-watchlist-list"></div>
      </div>
      <div id="rail-feature-block">
        <div class="rail-feat-top">Coup de cœur</div>
        <div class="rail-feat-list" id="rail-feature"></div>
      </div>
      <div id="rail-villette-block">
        <div class="rail-block-h">Ciné plein air</div>
        <div id="rail-villette"></div>
      </div>
    </aside>
    <div id="main">
      <div id="sticky-top">
        <header>
          <div id="header-top">
            <span id="imdb-legend">★ note IMDb (si disponible)</span>
          </div>
          <div id="date-label"></div>
          <input id="search" type="search" placeholder="Film, réalisateur, ou cinéma…" autocomplete="off">
          <div id="filters">
            <div id="tabs">
              <button class="tab active" data-tab="all">Tous les films</button>
              <button class="tab" data-tab="cultes">Films cultes</button>
              <button class="tab" data-tab="villette">Ciné plein air</button>
              <button class="tab" data-tab="watchlist">Ma liste</button>
            </div>
            <div id="showtime-filters">
              <div class="dd" id="time-filter-dd" data-value="all">
                <button type="button" class="dd-trigger" aria-haspopup="listbox" aria-expanded="false">
                  <span class="dd-label">Tous créneaux</span>
                  <span class="dd-chevron"></span>
                </button>
                <ul class="dd-menu" role="listbox" hidden>
                  <li class="dd-opt" role="option" data-value="all" aria-selected="true">Tous créneaux</li>
                  <li class="dd-opt" role="option" data-value="morning" aria-selected="false">Matin (avant 12h)</li>
                  <li class="dd-opt" role="option" data-value="afternoon" aria-selected="false">Après-midi (12h–18h)</li>
                  <li class="dd-opt" role="option" data-value="evening" aria-selected="false">Soir (après 18h)</li>
                </ul>
              </div>
              <div class="dd" id="version-filter-dd" data-value="all">
                <button type="button" class="dd-trigger" aria-haspopup="listbox" aria-expanded="false">
                  <span class="dd-label">VF / VO</span>
                  <span class="dd-chevron"></span>
                </button>
                <ul class="dd-menu" role="listbox" hidden>
                  <li class="dd-opt" role="option" data-value="all" aria-selected="true">VF / VO</li>
                  <li class="dd-opt" role="option" data-value="vo" aria-selected="false">VO</li>
                  <li class="dd-opt" role="option" data-value="vf" aria-selected="false">VF</li>
                </ul>
              </div>
            </div>
          </div>
        </header>
        <div id="status"></div>
        <div id="sort-bar">
          <button class="sort-btn active" data-sort="alpha">A → Z</button>
          <button class="sort-btn" data-sort="year">Année ↓</button>
          <button class="sort-btn" data-sort="imdb">IMDb ↓</button>
          <div id="view-toggle">
            <button class="view-btn active" data-view="list" title="Vue liste">☰</button>
            <button class="view-btn" data-view="grid" title="Vue grille">▦</button>
          </div>
        </div>
      </div>
      <ul id="movie-list"></ul>
      <div id="villette-list"></div>
      <div id="watchlist-list"></div>
      <footer>
        <span id="count-label"></span>
        · <span id="footer-source">données non officielles <a href="https://www.paris-cine.info" target="_blank" rel="noopener">paris-cine.info</a></span>
      </footer>
    </div>
  </div>
  <button id="back-to-top" title="Retour en haut" aria-label="Retour en haut">↑</button>
  <script src="app.js"></script>
</body>
</html>
